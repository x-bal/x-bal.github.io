# .github/workflows/deploy.yml
name: Deploy Vue Portfolio to GitHub Pages

on:
  # Trigger script setiap kali ada push ke branch main
  push:
    branches: ['main']
  # Memungkinkan jalannya action secara manual dari tab Actions
  workflow_dispatch:

# Mengatur permissions untuk GITHUB_TOKEN agar bisa men-deploy ke Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Mencegah deployment ganda berjalan bersamaan
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Job Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # Job Deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
